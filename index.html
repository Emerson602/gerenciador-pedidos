<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Pedidos</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="bg-[#141414] stylesheet" href="style.css">
</head>
<body class="bg-gray-100 pb-6">  

  <div class="container-logo">
        <img src="logo.webp">

  </div>

  <div class="flag">
    <div></div>
    <div></div>
    <div></div>
  </div>
  
  <div class="flex flex-wrap gap-2 justify-center mb-6">
    <button onclick="abrirModal()" 
      class="bg-black text-white px-4 h-12 rounded flex items-center justify-center w-[90%] sm:w-auto">
      📊 Gráfico
    </button>   

    <button id="btnPainel" onclick="togglePainel()" 
      class="bg-gray-700 text-white px-4 h-12 rounded flex items-center justify-center w-[90%] sm:w-auto">
      ⚙️ Esconder Painel
    </button>
  </div>


  <div class="max-w-5xl mx-auto">
    

    <h1 class="text-center text-2xl sm:text-3xl w-[90%] sm:w-auto mx-auto font-bold mb-6">
      📦 Gerenciador de Pedidos
    </h1>

<div id="painelControle" 
  class="container-painel max-w-md mx-auto bg-white rounded-2xl shadow mb-6 mt-6">
  
  <div class="flex gap-2 flex-wrap justify-center">
    
    <input id="pedido" placeholder="Número do pedido"
      class="border rounded" /> 

    <button onclick="criarPedido()" 
      class="bg-blue-500 text-white rounded">
      Criar
    </button>

  </div>
</div>

    <div id="lista" class="space-y-4 w-[90%] sm:w-full mx-auto"></div>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">📊 Estatisticas</h2>
        <button onclick="fecharModal()" class="text-red-500">✖</button>
      </div>

      <canvas id="grafico"></canvas>
      <div id="medias" class="mt-4 text-sm font-semibold"></div>
    </div>
  </div>

  <div id="modalSenhaEditar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl shadow-lg w-[90%] max-w-sm text-center">

    <h2 class="text-lg font-bold mb-4">Senha para editar</h2>

    <input 
      id="senhaEditar"
      type="password"
      placeholder="Digite a senha"
      class="border p-2 rounded w-full mb-4 text-center"
    />

    <p id="erroSenhaEditar" class="text-red-600 text-sm mb-2 hidden">
      ❌ Senha incorreta
    </p>

    <div class="flex gap-2 justify-center">
      <button onclick="confirmarEdicao()" class="bg-green-600 text-white px-4 py-2 rounded">
        Confirmar
      </button>

      <button onclick="fecharModalEditar()" class="bg-gray-400 text-white px-4 py-2 rounded">
        Cancelar
      </button>
    </div>

  </div>
</div>

<div id="modalExcluir" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl shadow-lg w-[90%] max-w-sm text-center">
    
    <h2 class="text-lg font-bold mb-4">Confirmar exclusão</h2>

    <p class="mb-2">
      Deseja excluir o pedido <strong id="pedidoExcluirNumero"></strong>?
    </p>

    <input 
      id="senhaExcluir"
      type="password"
      placeholder="Digite a senha"
      class="border p-2 rounded w-full mb-4 text-center"
    />

    <p id="erroSenha" class="text-red-600 text-sm mb-2 hidden">
      ❌ Senha incorreta
    </p>

    <div class="flex gap-2 justify-center">
      <button onclick="confirmarExclusao()" class="bg-red-600 text-white px-4 py-2 rounded">
        Confirmar
      </button>
      <button onclick="fecharModalExcluir()" class="bg-gray-400 text-white px-4 py-2 rounded">
        Cancelar
      </button>
    </div>

  </div>
</div>

<div id="modalSenhaEntregador" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl shadow-lg w-[90%] max-w-sm text-center">
    
    <h2 class="text-lg font-bold mb-4">Senha para alterar entregador</h2>

    <input id="senhaEditarEntregador" type="password"
      class="border p-2 rounded w-full mb-3"
      placeholder="Digite a senha">

    <p id="erroSenhaEntregador" class="text-red-500 hidden mb-2">
      Senha incorreta
    </p>

    <div class="flex gap-2 justify-center">
      <button onclick="confirmarSenhaEntregador()"
        class="bg-green-600 text-white px-4 py-2 rounded">
        Confirmar
      </button>

      <button onclick="fecharModalSenhaEntregador()"
        class="bg-gray-400 text-white px-4 py-2 rounded">
        Cancelar
      </button>
    </div>

  </div>
</div>
 
<div class="text-center mt-4">
  <button onclick="verMais()" 
    class="bg-blue-600 text-white px-4 py-2 rounded">
    Ver mais
  </button>
</div>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- JS -->
   <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="script.js"></script>


</body>
</html>
